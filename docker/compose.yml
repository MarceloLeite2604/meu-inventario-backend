name: mnz
services:
  pegada-backend:
    user: "${HOST_UID:-0}:${HOST_GID:-0}"
    build:
      context: ../.
      dockerfile: ./docker/Dockerfile
      args:
        - MNZ_PB_WORK_DIRECTORY=${MNZ_PB_WORK_DIRECTORY:-undefined}
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.${ENVIRONMENT}
        required: false
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
    image: mnz-pegada-backend:${IMAGE_TAG}
    ports:
      - "${MNZ_PB_PORT:-8000}:${MNZ_PB_PORT:-8000}"
      - "5680:5680"
    restart: unless-stopped
