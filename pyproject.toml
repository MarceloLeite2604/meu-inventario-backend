[tool.pyright]
typeCheckingMode = "standard"
pythonVersion = "3.13"
venvPath = "."
venv = ".venv"
extraPaths = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
testpaths = ["tests"]
addopts = "--cov=src --cov-report=html --cov-report=term-missing"
